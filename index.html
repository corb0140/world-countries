<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />

    <title>World Countries API</title>
  </head>
  <body>
    <section class="world-countries">
      <div class="container">
        <div class="container--heading">
          <div class="top">
            <h1>WORLD COUNTRIES</h1>
            <span class="back">< back</span>
          </div>
          <p class="total"></p>
        </div>

        <div class="container--cards grid">
          <label for="countries">Sort By:</label>
          <select class="countries" id="countries" name="countries" size="1">
            <option value="" disabled selected>Select An Option</option>
            <option value="population">Population</option>
            <option value="lang">Languages</option>
            <option value="region">Region</option>
          </select>

          <ul>
            <!-- APPEND CARD AND COUNTRIES HERE -->
          </ul>

          <div class="card"></div>
        </div>
      </div>
    </section>

    <script
      src="https://kit.fontawesome.com/c5e8ac74c4.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="main.js"></script>
  </body>
</html>
